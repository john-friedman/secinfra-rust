[package]
name = "secinfra"
version = "0.1.0"
edition = "2024"
description = "A package to work with SEC data."
license = "MIT"
repository = "https://github.com/john-friedman/secinfra-rust"
readme = "readme.md"
keywords = ["sec", "edgar", "filings", "securities and exchanges commission", "datamule"]

[dependencies]
anyhow = "1"
async-recursion = "1"
async-stream = "0.3"
chrono = "0.4"
futures = "0.3"
indexmap = "2"
quick-xml = { version = "0.36", features = ["async-tokio"] }
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"

[dev-dependencies]
tracing-subscriber = "0.3"
